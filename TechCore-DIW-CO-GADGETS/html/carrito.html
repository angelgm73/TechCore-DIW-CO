<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carrito - UrbanTech</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="index.html">
                    <img src="../imagenes/LogoConNombre.png" alt="Volver a la página de inicio">
                    <span>UrbanTech</span>
                </a>
            </div>

            <nav class="main-nav" aria-label="Navegación principal">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <span class="separador" aria-hidden="true">|</span>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <span class="separador" aria-hidden="true">|</span>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>

            <form action="/buscar" method="get" class="buscador">
                <label for="buscar-input" class="visually-hidden">Buscar productos</label>
                <button type="submit" aria-label="Buscar">🔍</button>
                <input type="search" id="buscar-input" name="buscar" placeholder="buscar">
            </form>

            <div class="usuario">
                <a href="mi-cuenta.html" class="mi-cuenta">👤 Mi cuenta</a>
                <a href="carrito.html">🛒 Mi cesta</a>
            </div>
        </header>

        <main>
            <section class="main">
                <h1 class="titulo-carrito text-white mb-4">Carrito</h1>
                
                <div class="contenedor-carrito">
                    <div class="lista-productos">
                        <div class="producto-item p-3 border rounded bg-dark text-white">
                            <div class="producto-img">
                                <img src="../imagenes/auricular2.jpg" alt="Apple AirPods Pro (2.ª gen)">
                            </div>
                            <div class="producto-info">
                                <h2 class="producto-nombre fs-5 m-0">Apple AirPods Pro (2.ª gen)</h2>
                                <p class="producto-precio m-0">
                                    <span class="oferta text-danger fw-bold fs-4">209€</span>
                                    <span class="preciomenos text-light-50 fs-6"><s>229€</s></span>
                                </p>
                                <div class="producto-cantidad">
                                    <label for="cantidad-airpods" class="me-2 text-white">Cantidad:</label>
                                    <input type="number" id="cantidad-airpods" value="1" min="1" class="text-dark form-control-sm border-0 rounded text-center" style="width: 60px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="resumen-carrito text-dark p-4 rounded bg-light">
                        <h2 class="fs-4 fw-bold mb-3">Resumen</h2>
                        <hr>
                        <div class="fila-resumen">
                            <span>Subtotal</span>
                            <span>1200€</span>
                        </div>
                        <div class="fila-resumen">
                            <span>Coste de envío <span aria-label="Información útil">ⓘ</span></span>
                            <span>Gratis</span>
                        </div>
                        <hr>
                        <div class="fila-resumen total fs-5 fw-bold">
                            <span>Total</span>
                            <span>1200€</span>
                        </div>
                        <button class="boton-tramitar btn btn-danger w-100 py-3 mt-3 fw-bold text-white border-0 rounded-pill">Tramitar Pedido</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-container">
                <div class="footer-logo">
                    <a href="index.html">
                        <img src="../imagenes/LogoSinNombre.png" alt="Inicio">
                    </a>
                </div>

                <nav class="footer-secciones" aria-label="Enlaces del pie de página">
                    <div class="footer-nav">
                        <ul>
                            <li><a href="contacto.html">Contacto</a></li>
                            <li><a href="quienes-somos.html">¿Quiénes somos?</a></li>
                            <li><a href="politica-privacidad.html">Política de privacidad</a></li>
                        </ul>
                    </div>
                </nav>

                <div class="footer-redes">
                    <a href="https://x.com"><img src="../imagenes/x.png" alt="X" width="30"></a>
                    <a href="https://facebook.com"><img src="../imagenes/facebook.png" alt="Facebook" width="30"></a>
                    <a href="https://instagram.com"><img src="../imagenes/instagram.png" alt="Instagram" width="30"></a>
                </div>
            </div>

            <div class="direccion">
                <p>TechCore Av Schultz Nº 30 Gijón, Asturias</p>
            </div>
        </footer>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
