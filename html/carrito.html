<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carrito</title>
        <link rel="stylesheet" href="../css/styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
    <!-- HEADER: Todo en una línea en PC -->
    <header class="container py-3 border-bottom">
        <div class="row align-items-center flex-nowrap">
            
            <!-- Hamburguesa (Móvil) -->
            <div class="col-auto d-lg-none">
                <div id="burger-menu" style="cursor:pointer; font-size:1.5em;">☰</div>
            </div>

            <!-- Logo -->
            <div class="col-auto logo">
                <a href="index.html" class="text-decoration-none text-dark d-flex align-items-center">
                    <img src="../imagenes/logoSinTexto.png" alt="Logo" height="35">
                    <span class="ms-2 fw-bold fs-4">TechCore</span>
                </a>
            </div>

            <!-- Navegación, Buscador y Usuario -->
            <nav class="main-nav col d-flex justify-content-end align-items-center">
                <!-- display: none para evitar el bug de carga; flex-lg-row para línea horizontal -->
                <ul class="nav d-flex flex-column flex-lg-row align-items-center list-unstyled mb-0" style="display: none;">
                    <li class="nav-item"><a href="index.html" class="nav-link text-primary">Inicio</a></li>
                    <li class="d-none d-lg-block text-muted px-1">|</li>
                    <li class="nav-item"><a href="catalogo.html" class="nav-link text-dark">Catalogo</a></li>
                    <li class="d-none d-lg-block text-muted px-1">|</li>
                    <li class="nav-item"><a href="contacto.html" class="nav-link text-dark">Contacto</a></li>
                    
                    <!-- Buscador -->
                    <li class="px-lg-3 py-2 py-lg-0">
                        <form class="d-flex border rounded-pill px-2 bg-light">
                            <span class="p-1">🔍</span>
                            <input type="search" placeholder="buscar" class="form-control border-0 bg-transparent shadow-none" style="width: 110px;">
                        </form>
                    </li>

                    <!-- Bloque Usuario: A la derecha del buscador -->
                    <li class="usuario d-flex gap-3 align-items-center text-nowrap">
                        <a href="mi-cuenta.html" class="text-dark text-decoration-none small">👤 Mi cuenta</a>
                        <a href="carrito.html" class="text-dark text-decoration-none fw-bold small">🛒 Mi cesta</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

        <!-- CUERPO DEL CARRITO -->
        <main class="container my-5">
            <h2 class="fw-bold mb-4">Carrito</h2>
            <div class="row g-4">
                <div class="col-12 col-lg-8">
                    <div class="producto border p-4 d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <img src="../imagenes/monitor1.jpg" alt="Producto" width="100" class="me-3">
                            <div>
                                <p class="mb-0 fw-bold">Monitor Lenovo L27q-27"</p>
                                <p class="text-danger fw-bold mb-0">239€</p>
                            </div>
                        </div>
                        <input type="number" value="1" class="form-control text-center" style="width: 60px;">
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="p-4 border" style="background-color: #f1f1f1; border-radius: 8px;">
                        <h3 class="h5 fw-bold mb-3">Resumen</h3>
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span>239€</span></div>
                        <div class="d-flex justify-content-between mb-4"><span>Envío</span><span class="text-success fw-bold">Gratis</span></div>
                        <hr>
                        <div class="d-flex justify-content-between h5 fw-bold"><span>Total</span><span>239€</span></div>
                        <button class="btn w-100 py-3 text-white mt-3" style="background-color: #f7690a; border-radius: 25px;">Tramitar Pedido</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER COMPLETO -->
        <footer class="container-fluid border-top py-5 bg-light mt-auto">
            <div class="container">
                <div class="row align-items-center text-center text-md-start">
                    <div class="col-md-4 mb-4 mb-md-0">
                        <img src="../imagenes/logoSinTexto.png" alt="Logo" width="40">
                        <div class="fw-bold mt-2">TechCore</div>
                    </div>
                    <div class="col-md-4 mb-4 mb-md-0">
                        <nav class="d-flex flex-column gap-2 small fw-bold">
                            <a href="contacto.html" class="text-dark text-decoration-none">Contacto</a>
                            <a href="quienes-somos.html" class="text-dark text-decoration-none">¿Quiénes somos?</a>
                            <a href="politica-privacidad.html" class="text-dark text-decoration-none">Política de privacidad</a>
                        </nav>
                    </div>
                    <div class="col-md-4 text-md-end">
                        <div class="d-flex justify-content-center justify-content-md-end gap-3">
                            <a href="#"><img src="../imagenes/x.png" alt="X" width="30"></a>
                            <a href="#"><img src="../imagenes/facebook.png" alt="FB" width="30"></a>
                            <a href="#"><img src="../imagenes/instagram.png" alt="IG" width="30"></a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-5 small text-muted">
                    TechCore Av Schultz Nº 23 Gijón, Asturias
                </div>
            </div>
        </footer>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
