<!DOCTYPE html>

<head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header class="border-bottom bg-white">
        <div class="container py-3">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none">
                    <img src="../imagenes/logoSinTexto.png" alt="Volver a la pagina de inicio" height="36">
                    <span class="fw-bold text-dark">TechCore</span>
                </a>

                <nav>
                    <ul class="nav">
                        <li class="nav-item"><a class="nav-link text-dark" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link text-dark" href="catalogo.html">Catalogo</a></li>
                        <li class="nav-item"><a class="nav-link text-dark" href="contacto.html">Contacto</a></li>
                    </ul>
                </nav>

                <form action="/buscar" method="get" class="d-flex">
                    <input class="form-control me-2" type="search" name="buscar" placeholder="Buscar">
                    <button class="btn btn-outline-dark" type="submit">🔍</button>
                </form>

                <div class="d-flex gap-3">
                    <a href="mi-cuenta.html" class="text-decoration-none text-dark">👤 Mi cuenta</a>
                    <a href="carrito.html" class="text-decoration-none text-dark">🛒 Mi cesta</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-5 flex-grow-1 d-flex align-items-center">
        <div class="row justify-content-center w-100 m-0">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-4 text-center">Iniciar sesion</h1>

                        <form action="#">
                            <div class="mb-3">
                                <label for="username" class="form-label">Nombre de usuario</label>
                                <input type="text" id="username" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" id="password" class="form-control">
                            </div>

                            <button type="submit" class="btn btn-dark w-100">Iniciar sesion</button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="mb-2">Aun no tienes una cuenta?</p>
                            <button class="btn btn-outline-dark">Registrate</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-top bg-white mt-auto">
        <div class="container py-4">
            <div class="row g-3 text-center text-lg-start align-items-center">
                <div class="col-12 col-lg-3">
                    <a href="index.html" class="d-inline-block">
                        <img src="../imagenes/logojpg-removebg-preview.png" alt="Inicio" height="40">
                    </a>
                </div>

                <div class="col-12 col-lg-6">
                    <ul class="nav justify-content-center">
                        <li class="nav-item"><a class="nav-link text-dark" href="contacto.html">Contacto</a></li>
                        <li class="nav-item"><a class="nav-link text-dark" href="quienes-somos.html">Quienes somos?</a></li>
                        <li class="nav-item"><a class="nav-link text-dark" href="politica-privacidad.html">Politica de privacidad</a></li>

                    <a href="https://facebook.com" class="me-2 text-decoration-none"><img src="../imagenes/facebook.png" alt="Facebook" width="30"></a>

                </div>
            </div>

            <div class="text-center small text-muted mt-3">
                TechCore Av Schultz No 23 Gijon, Asturias
            </div>
        </div>
