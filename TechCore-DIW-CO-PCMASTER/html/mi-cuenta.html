<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Cuenta - WiredZone</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body class="bg-cream d-flex flex-column min-vh-100">
        <header
            class="navbar navbar-expand-lg navbar-light bg-cream border-bottom-blue py-3">
            <div class="container">
                <button
                    id="burger-menu"
                    class="navbar-toggler me-2 border-dark"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand d-flex align-items-center gap-2"
                    href="index.html">
                    <img src="../imagenes/logoletras.png"
                        alt="Inicio" height="36">
                    <span class="fw-bold text-primary"
                        style="font-size: 2rem">PcMaster</span>
                </a>

                <div class="collapse navbar-collapse main-nav"
                    id="menuPrincipal">
                    <ul
                        class="navbar-nav me-auto mb-2 mb-lg-0 align-items-start align-items-lg-center">
                        <li class="nav-link"
                            href="index.html"
                            style="color: #0056b3; font-weight: 500"><a
                                href="index.html">Inicio</a></li>
                        <span class="separador d-none d-lg-inline mx-2"
                            style="color: #ccc">|</span>
                        <li class="nav-link"
                            href="index.html"
                            style="color: #0056b3; font-weight: 500"><a
                                href="catalogo.html">Catalogo</a></li>
                        <span class="separador d-none d-lg-inline mx-2"
                            style="color: #ccc">|</span>
                        <li class="nav-link"
                            href="index.html"
                            style="color: #0056b3; font-weight: 500"><a
                                href="contacto.html">Contacto</a></li>
                    </ul>

                    <form action="/buscar"
                        method="get"
                        class="d-flex my-3 my-lg-0 me-lg-3"
                        role="search">
                        <input
                            class="form-control me-2"
                            type="search"
                            name="buscar"
                            placeholder="buscar"
                            style="border-radius: 20px; border: 1px solid #222222" />
                        <button class="btn" type="submit">🔍</button>
                    </form>

                    <div class="usuario d-flex flex-column flex-lg-row gap-3">
                        <a href="mi-cuenta.html"
                            class="text-decoration-none text-primary">👤 Mi
                            cuenta</a>
                        <a href="carrito.html"
                            class="text-decoration-none text-primary">🛒
                            Mi cesta</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="container py-5 flex-grow-1 d-flex align-items-center">
            <div class="row justify-content-center w-100 m-0">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h1 class="h4 mb-4 text-center">Iniciar sesion</h1>

                            <form action="#">
                                <div class="mb-3">
                                    <label for="username"
                                        class="form-label">Nombre de
                                        usuario</label>
                                    <input type="text" id="username"
                                        class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label for="password"
                                        class="form-label">Contrasena</label>
                                    <input type="password" id="password"
                                        class="form-control">
                                </div>

                                <button type="submit"
                                    class="btn btn-dark w-100">Iniciar
                                    sesion</button>
                            </form>

                            <hr class="my-4">

                            <div class="text-center">
                                <p class="mb-2">Aun no tienes una cuenta?</p>
                                <button
                                    class="btn btn-outline-dark">Registrate</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="border-top bg-cream mt-5 py-4">
            <div class="container">
                <div class="row align-items-center g-3">
                    <div class="col-12 col-lg-3 text-center text-lg-start">
                        <a href="index.html">
                            <img src="../imagenes/logo_sinletras.png"
                                alt="Inicio" height="60">
                        </a>
                    </div>

                    <div class="col-12 col-lg-6">
                        <nav>
                            <ul class="nav justify-content-center">
                                <li class="nav-item"><a
                                        class="nav-link text-dark px-2"
                                        href="contacto.html">Contacto</a></li>
                                <li class="nav-item"><a
                                        class="nav-link text-dark px-2"
                                        href="quienes-somos.html">¿Quiénes
                                        somos?</a></li>
                                <li class="nav-item"><a
                                        class="nav-link text-dark px-2"
                                        href="politica-privacidad.html">Política
                                        de privacidad</a></li>
                            </ul>
                        </nav>
                    </div>

                    <div class="col-12 col-lg-3 text-center text-lg-end">
                        <div
                            class="d-flex justify-content-center justify-content-lg-end gap-3">
                            <a href="https://x.com"><img src="../imagenes/x.png"
                                    alt="X" width="24"></a>
                            <a href="https://facebook.com"><img
                                    src="../imagenes/facebook.png"
                                    alt="Facebook"
                                    width="24"></a>
                            <a href="https://instagram.com"><img
                                    src="../imagenes/instagram.png"
                                    alt="Instagram"
                                    width="24"></a>
                        </div>
                    </div>
                </div>
                <div class="text-center small text-dark mt-4">
                    WiredZone Av Schultz No 30 Gijon, Asturias
                </div>
            </div>
        </footer>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
