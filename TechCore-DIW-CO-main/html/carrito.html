<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - TechCore</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="bg-light">
    <header
      class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3"
    >
      <div class="container">
        <button
          id="burger-menu"
          class="navbar-toggler me-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
          aria-label="Abrir menu de navegacion"
          aria-controls="menuPrincipal"
          aria-expanded="false"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="index.html"
        >
          <img src="../imagenes/logoSinTexto.png" alt="Inicio" height="36" />
          <span class="fw-bold text-dark" style="font-size: 2rem"
            >TechCore</span
          >
        </a>

        <div class="collapse navbar-collapse main-nav" id="menuPrincipal">
          <ul
            class="navbar-nav me-auto mb-2 mb-lg-0 align-items-start align-items-lg-center"
          >
            <li class="nav-item">
              <a
                class="nav-link"
                href="index.html"
                style="color: #0056b3; font-weight: 500"
                >Inicio</a
              >
            </li>
            <span class="separador d-none d-lg-inline mx-2" style="color: #666"
              >|</span
            >
            <li class="nav-item">
              <a
                class="nav-link"
                href="catalogo.html"
                style="color: #0056b3; font-weight: 500"
                >Catalogo</a
              >
            </li>
            <span class="separador d-none d-lg-inline mx-2" style="color: #666"
              >|</span
            >
            <li class="nav-item">
              <a
                class="nav-link"
                href="contacto.html"
                style="color: #0056b3; font-weight: 500"
                >Contacto</a
              >
            </li>
          </ul>

          <form
            action="/buscar"
            method="get"
            class="d-flex my-3 my-lg-0 me-lg-3"
            role="search"
          >
            <label for="buscar-productos" class="visually-hidden"
              >Buscar productos</label
            >
            <input
              id="buscar-productos"
              class="form-control me-2"
              type="search"
              name="buscar"
              placeholder="Buscar productos"
              style="border-radius: 20px; border: 1px solid #999"
            />
            <button class="btn" type="submit" aria-label="Buscar productos">
              🔍
            </button>
          </form>

          <div class="usuario d-flex flex-column flex-lg-row gap-3">
            <a href="mi-cuenta.html" class="text-decoration-none text-dark"
              >👤 Mi cuenta</a
            >
            <a href="carrito.html" class="text-decoration-none text-dark"
              >🛒 Mi cesta</a
            >
          </div>
        </div>
      </div>
    </header>

    <main class="container py-5">
      <h1 class="fw-bold mb-4">Carrito</h1>

      <div class="row g-5">
        <section class="col-12 col-lg-7">
          <div
            class="producto bg-white p-3 d-flex align-items-center position-relative"
            style="border: 1px solid #000; min-height: 180px"
          >
            <div class="me-4">
              <img
                src="../imagenes/monitor1.jpg"
                alt="Monitor Lenovo"
                style="width: 140px; height: auto"
              />
            </div>

            <div class="flex-grow-1">
              <h2
                class="h4 fw-normal mb-2"
                style="max-width: 250px; line-height: 1.2"
              >
                Monitor Lenovo L27q-27"
              </h2>
              <p class="h4 fw-bold text-danger">239€</p>
            </div>

            <div
              class="position-absolute bottom-0 end-0 p-3 d-flex align-items-center gap-2"
            >
              <label class="small" for="cantidad-principal">Cantidad</label>
              <input
                id="cantidad-principal"
                type="number"
                value="1"
                min="1"
                style="width: 50px; border: 1px solid #000; text-align: center"
              />
            </div>
          </div>
        </section>

        <aside class="col-12 col-lg-5">
          <div
            class="p-4"
            style="background-color: #e5e0e0; border-radius: 4px"
          >
            <h2 class="h4 fw-bold mb-4">Resumen</h2>
            <div class="border-top border-dark pt-3">
              <div class="d-flex justify-content-between mb-3">
                <span>Subtotal</span>
                <span>1200€</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span>Coste de envío <span style="cursor: help">ⓘ</span></span>
                <span>Gratis</span>
              </div>
              <div
                class="border-top border-dark pt-3 d-flex justify-content-between mb-4"
              >
                <span class="fw-bold">Total</span>
                <span class="fw-bold">1200€</span>
              </div>
            </div>
            <button
              class="btn w-100 py-2 fw-bold text-white shadow-sm"
              style="
                background-color: #ff6600;
                border-radius: 20px;
                border: none;
              "
            >
              Tramitar Pedido
            </button>
          </div>
        </aside>
      </div>
    </main>

    <footer class="border-top bg-white mt-5 py-4">
      <div class="container">
        <div class="row align-items-center g-3">
          <div class="col-12 col-lg-3 text-center text-lg-start">
            <a href="index.html">
              <img
                src="../imagenes/logojpg-removebg-preview.png"
                alt="TechCore"
                height="60"
              />
            </a>
          </div>

          <div class="col-12 col-lg-6">
            <nav>
              <ul class="nav justify-content-center">
                <li class="nav-item">
                  <a class="nav-link text-dark px-2" href="contacto.html"
                    >Contacto</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link text-dark px-2" href="quienes-somos.html"
                    >¿Quiénes somos?</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link text-dark px-2"
                    href="politica-privacidad.html"
                    >Política de privacidad</a
                  >
                </li>
              </ul>
            </nav>
          </div>

          <div class="col-12 col-lg-3 text-center text-lg-end">
            <div
              class="d-flex justify-content-center justify-content-lg-end gap-3"
            >
              <a href="https://x.com" aria-label="X"
                ><img src="../imagenes/x.png" alt="" width="24"
              /></a>
              <a href="https://facebook.com" aria-label="Facebook"
                ><img src="../imagenes/facebook.png" alt="" width="24"
              /></a>
              <a href="https://instagram.com" aria-label="Instagram"
                ><img src="../imagenes/instagram.png" alt="" width="24"
              /></a>
            </div>
          </div>
        </div>
        <div class="text-center small text-muted mt-4">
          TechCore Av Schultz No 23 Gijon, Asturias
        </div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="../js/script.js"></script>
  </body>
</html>
