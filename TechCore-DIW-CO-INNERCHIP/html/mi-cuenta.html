<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - TechCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
               <img src="../imagenes/logo_sinletras.png" alt="InnerChip Inicio">
                <span>InnerChip</span>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <span class="separador">|</span>
                <li><a href="catalogo.html">Catálogo</a></li>
                <span class="separador">|</span>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

        <form action="/buscar" method="get" class="buscador" role="search">
            <button type="submit" aria-label="Buscar">🔍</button>
            <input type="search" name="buscar" id="buscar-nav" placeholder="Buscar..." aria-label="Buscar en el sitio">
        </form>

        <div class="usuario">
            <a href="mi-cuenta.html" class="mi-cuenta">👤 Mi cuenta</a>
            <a href="carrito.html">🛒 Mi cesta</a>
        </div>
    </header>
    
    <main class="container my-5">
        <section class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <h1 class="titulo-usuario text-center mb-4">Iniciar sesión</h1>

                <div class="usuario-caja p-4 border-cyber">
                    <form action="#" class="form-usuario">
                        <div class="mb-3">
                            <label for="username" class="form-label label-usuario">Nombre de usuario</label>
                            <input type="text" id="username" class="form-control input-usuario" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label label-usuario">Contraseña</label>
                            <input type="password" id="password" class="form-control input-usuario" required>
                        </div>

                        <button type="submit" class="btn boton-registro w-100 fw-bold">Iniciar sesión</button>
                    </form>

                    <div class="registro-usuario mt-4 pt-3 text-center">
                        <p class="mb-2 text-white">¿Aún no tienes una cuenta?</p>
                        <button class="btn boton-usuario fw-bold">Regístrate</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="footer-container">
            <div class="footer-logo">
                <a href="index.html">
                    <img src="../imagenes/logoletras.png" alt="InnerChip">
                </a>
            </div>

            <div class="footer-secciones">
                <nav class="footer-nav">
                    <ul>
                        <li><a href="contacto.html">Contacto</a></li>
                        <li><a href="quienes-somos.html">¿Quiénes somos?</a></li>
                        <li><a href="politica-privacidad.html">Política de privacidad</a></li>
                    </ul>
                </nav>
            </div>

            <div class="footer-redes">
                <a href="https://x.com" aria-label="Ir a nuestro perfil de X"><img src="../imagenes/x.png" alt="" width="30"></a>
                <a href="https://facebook.com" aria-label="Ir a nuestro Facebook"><img src="../imagenes/facebook.png" alt="" width="30"></a>
                <a href="https://instagram.com" aria-label="Ir a nuestro Instagram"><img src="../imagenes/instagram.png" alt="" width="30"></a>
            </div>
        </div>

        <div class="direccion text-center mt-3">
            <p class="mb-0">InnerChip · Calle Marqués de San Esteban Nº 76, Gijón, Asturias</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
